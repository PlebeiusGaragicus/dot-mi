site_name: dot-mi
site_description: Custom pi agent teams as dotfiles
site_url: https://PlebeiusGaragicus.github.io/dot-mi/
repo_url: https://github.com/PlebeiusGaragicus/dot-mi
repo_name: dot-mi

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Usage Guide: usage.md
  - Architecture: architecture.md
  - Standalone Agents: standalone-agents.md
  - Teams:
    - Recon: teams/recon.md
    - Impl: teams/impl.md
    - Blog: teams/blog.md
    - Deep Research: teams/deepresearch.md
  - Reference:
    - Writing Extensions: reference/extensions.md
    - Subagent Extension: reference/subagent-teams.md
